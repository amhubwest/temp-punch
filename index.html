<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex">
<title>Temp Time Clock — AM-HUB West</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0e2440; --navy-deep:#051931;
    --teal:#03aebc; --teal-dark:#028fa0;
    --orange:#fa6515; --red:#ed2124;
    --cream:#f6f2e7; --line:#e4dcc9;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--cream); color:var(--navy); min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  header { background:#fff; text-align:center; padding:18px 20px 14px; }
  header img.logo { width:150px; height:auto; display:block; margin:0 auto 8px; }
  header h1 { font-size:22px; font-weight:800; letter-spacing:.07em; color:var(--navy-deep); }
  header h1 span { color:var(--teal); }
  .brandbar { height:5px; background:linear-gradient(90deg, var(--orange), var(--red)); }

  main { flex:1; width:100%; max-width:460px; margin:0 auto; padding:20px 16px 40px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px 18px; box-shadow:0 1px 3px rgba(5,25,49,.07); }

  .hidden { display:none !important; }

  /* ---- Register ---- */
  #register h2 { font-size:18px; letter-spacing:.03em; color:var(--navy-deep); margin-bottom:6px; }
  #register p { font-size:13.5px; color:#6b6557; margin-bottom:18px; line-height:1.5; }
  label { display:block; font-size:12.5px; font-weight:600; color:#5b5748; margin:14px 0 5px; }
  input[type=text] { width:100%; padding:13px 12px; font-size:17px; border:1.5px solid #d5cdba; border-radius:9px; outline:none; background:#fff; color:var(--navy); }
  input[type=text]:focus { border-color:var(--teal); }
  .btn { display:block; width:100%; border:none; border-radius:11px; font-size:17px; font-weight:700; padding:15px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .btn-teal { background:var(--teal); color:#fff; margin-top:20px; }
  .btn-teal:active { background:var(--teal-dark); }

  /* ---- Punch screen ---- */
  #greet { margin-bottom:16px; }
  #greet .hi { font-size:21px; font-weight:700; color:var(--navy-deep); }
  #greet .date { font-size:13px; color:#8a8371; margin-top:2px; }
  .punch-btn { display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:#fff; border:1.5px solid #d9d2c0; border-radius:12px; padding:16px 16px; margin-bottom:11px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .punch-btn:active { background:#faf7ef; }
  .punch-btn .pt { font-size:17px; font-weight:700; color:var(--navy); }
  .punch-btn .ps { font-size:12.5px; color:#948d7b; margin-top:1px; }
  .punch-btn .ic { flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:#e7f5f7; color:var(--teal-dark); display:flex; align-items:center; justify-content:center; }
  .punch-btn.suggested { border-color:var(--teal); background:#eefafb; }
  .punch-btn.suggested .ic { background:var(--teal); color:#fff; }
  .punch-btn.suggested .pt { color:var(--teal-dark); }
  .punch-btn.suggested::after { content:'NEXT'; margin-left:auto; font-size:10px; font-weight:800; letter-spacing:.1em; color:#fff; background:var(--orange); border-radius:5px; padding:3px 7px; }
  .switch { text-align:center; margin-top:14px; }
  .switch a { font-size:13px; color:#948d7b; text-decoration:underline; cursor:pointer; }

  /* ---- Embedded form overlay ---- */
  #formWrap { position:fixed; inset:0; background:#fff; z-index:20; display:flex; flex-direction:column; }
  .fw-bar { background:var(--navy-deep); color:#fff; display:flex; align-items:center; justify-content:space-between; padding:13px 16px; }
  .fw-bar .t { font-size:16px; font-weight:700; }
  .fw-bar a { color:#fff; font-size:14px; font-weight:600; text-decoration:none; background:rgba(255,255,255,.16); border-radius:8px; padding:7px 13px; cursor:pointer; }
  #fwFrame { flex:1; width:100%; border:0; background:#fff; }
  #fwBanner { text-align:center; font-size:13px; padding:9px 10px; line-height:1.55; background:#fdf0e2; color:#8a4b12; border-bottom:1px solid #f3ddc2; }
  #fwBanner .stp { white-space:nowrap; margin:0 5px; }
  #fwBanner .n { display:inline-block; width:17px; height:17px; line-height:17px; border-radius:50%; background:var(--teal); color:#fff; font-weight:800; font-size:11px; text-align:center; vertical-align:1px; }
  #fwBanner a { color:var(--teal-dark); font-size:12px; }

  #err { display:none; background:#fdecea; color:#b3261e; border:1px solid #f5c6c2; border-radius:9px; font-size:13.5px; padding:11px 13px; margin-bottom:14px; line-height:1.4; }
</style>
</head>

  <h1>TEMP <span>TIME CLOCK</span></h1>
</header>
<div class="brandbar"></div>

<main>
  <div id="err"></div>

  <!-- First visit: who are you -->
  <section class="card hidden" id="register">
    <h2>WELCOME TO AM-HUB WEST</h2>
    <p>Enter your full name below (this is only required once unless you switch to a new phone or tablet)</p>
    <label for="fn">First name</label>
    <input type="text" id="fn" autocomplete="given-name" autocapitalize="words">
    <label for="ln">Last name</label>
    <input type="text" id="ln" autocomplete="family-name" autocapitalize="words">
    <button class="btn btn-teal" id="saveBtn">Continue</button>
  </section>

  <!-- Punch -->
  <section class="card hidden" id="punch">
    <div id="greet"><div class="hi"></div><div class="date"></div></div>
    <div id="punchBtns"></div>
    <div class="switch"><a id="switchUser">Not you? Switch person</a></div>
  </section>
</main>

<!-- Embedded form -->
<div id="formWrap" class="hidden">
  <div class="fw-bar"><span class="t" id="fwTitle"></span><a id="fwClose">Close &#10005;</a></div>
  <div id="fwBanner"><span class="stp"><span class="n">1</span> Tap <b>Submit</b> at the bottom &#11015;</span><span class="stp"><span class="n">2</span> See the &#10003;, then tap <b>Close</b> up top</span><br><a id="fwDirect" target="_blank" rel="noopener">Form not loading?</a></div>
  <iframe id="fwFrame" src="about:blank" title="Punch form"></iframe>
</div>

<script>
/* ================= CONFIG =================
   1. Create the "Temp Time Clock" Microsoft Form (see build guide):
        Q1 text  = Your name (First Last)
        Q2 choice = Punch  →  Start Shift / Lunch Out / Lunch In / End Shift
   2. On the form: ⋯ menu → "Get pre-filled URL"
        answer Q1 with exactly:  NAMEHERE
        answer Q2 with:          Start Shift
      Copy that link and paste it between the quotes below.       */
const PREFILL_SAMPLE = "https://forms.office.com/Pages/ResponsePage.aspx?id=7gpM-9JsL0ihpXF-fAJJa4uyb3W6knFFgWJ3yKuR1UtUNlI2SE9RSU9HUlE3UzZOUFhZWDNBVkFTUSQlQCN0PWcu&rc6452bc35d1d426da38f8ac74b5f9d22=NAMEHERE&r6149240f6e8448e9975efb098a4bfd3b=%22Start%20Shift%22";
/* ========================================== */

const PUNCHES = [
  { type:"Start Shift", sub:"Beginning of your day",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>' },
  { type:"Lunch Out", sub:"Leaving for lunch",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>' },
  { type:"Lunch In", sub:"Back from lunch",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' },
  { type:"End Shift", sub:"Done for the day",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>' }
];

const $ = id => document.getElementById(id);
const err = $('err');
let identity = null;     // { name, id }

/* ---------- identity ---------- */
function loadIdentity(){
  const p = new URLSearchParams(location.search);
  const n = (p.get('n')||'').trim(), e = (p.get('e')||'').trim();
  if (n){
    identity = { name:n, id:e };
    try { localStorage.setItem('tpIdentity', JSON.stringify(identity)); } catch(_){}
    history.replaceState(null,'',location.pathname);
    return;
  }
  try {
    const s = localStorage.getItem('tpIdentity');
    if (s){ const o = JSON.parse(s); if (o && o.name) identity = o; }
  } catch(_){}
}

/* ---------- suggestion ---------- */
function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}
function suggestedType(){
  try {
    const s = JSON.parse(localStorage.getItem('tpLast')||'null');
    if (!s || s.day !== todayKey()) return 'Start Shift';
    const i = PUNCHES.findIndex(p => p.type === s.type);
    return (i >= 0 && i < PUNCHES.length-1) ? PUNCHES[i+1].type : 'Start Shift';
  } catch(_) { return 'Start Shift'; }
}

/* ---------- screens ---------- */
function show(id){
  ['register','punch'].forEach(s => $(s).classList.toggle('hidden', s !== id));
}
function renderPunch(){
  $('greet').querySelector('.hi').textContent = 'Hi, ' + identity.name.split(' ')[0] + ' \uD83D\uDC4B';
  $('greet').querySelector('.date').textContent =
    new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
  const sug = suggestedType();
  const wrap = $('punchBtns'); wrap.innerHTML = '';
  PUNCHES.forEach(p => {
    const b = document.createElement('button');
    b.className = 'punch-btn' + (p.type === sug ? ' suggested' : '');
    b.innerHTML = '<span class="ic">' + p.ic + '</span><span><span class="pt">' + p.type + '</span><br><span class="ps">' + p.sub + '</span></span>';
    b.onclick = () => openForm(p.type);
    wrap.appendChild(b);
  });
  show('punch');
}

/* ---------- prefilled Form URL ---------- */
function formUrl(name, punch){
  let u = PREFILL_SAMPLE;
  u = u.replace(/NAMEHERE/g, encodeURIComponent(name));
  u = u.replace(/Start(?:%20|\+| )Shift/g, m =>
        m.indexOf('+') > -1 ? encodeURIComponent(punch).replace(/%20/g,'+') : encodeURIComponent(punch));
  return u;
}
function configured(){
  return /^https?:\/\//.test(PREFILL_SAMPLE) && PREFILL_SAMPLE.indexOf('NAMEHERE') > -1;
}

/* ---------- embedded form ---------- */
function openForm(type){
  err.style.display = 'none';
  if (!configured()){
    err.textContent = 'This page is not connected to the form yet — paste the pre-filled form URL into PREFILL_SAMPLE (see build guide).';
    err.style.display = 'block';
    window.scrollTo(0,0);
    return;
  }
  if (!navigator.onLine){
    err.textContent = 'Your phone looks offline — reconnect and try again, or tell your supervisor the time so it can be entered manually.';
    err.style.display = 'block';
    window.scrollTo(0,0);
    return;
  }
  const url = formUrl(identity.name, type);
  $('fwTitle').textContent = type + ' — ' + identity.name.split(' ')[0];
  $('fwFrame').src = url + '&embed=true';
  $('fwDirect').href = url;
  $('formWrap').classList.remove('hidden');
  try { localStorage.setItem('tpLast', JSON.stringify({ type, day: todayKey() })); } catch(_){}
}
function closeForm(){
  $('formWrap').classList.add('hidden');
  $('fwFrame').src = 'about:blank';
  renderPunch();
}

/* ---------- wiring ---------- */
$('saveBtn').onclick = () => {
  const cap = s => s.replace(/(^|\s)\S/g, c => c.toUpperCase());
  const fn = cap($('fn').value.trim()), ln = cap($('ln').value.trim());
  if (!fn || !ln){
    err.textContent = 'Please enter both your first and last name.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  identity = { name: fn + ' ' + ln, id: 'P-' + Math.random().toString(36).slice(2,6).toUpperCase() };
  try { localStorage.setItem('tpIdentity', JSON.stringify(identity)); } catch(_){}
  renderPunch();
};
$('switchUser').onclick = () => {
  try { localStorage.removeItem('tpIdentity'); localStorage.removeItem('tpLast'); } catch(_){}
  identity = null; $('fn').value = ''; $('ln').value = '';
  show('register');
};
$('fwClose').onclick = closeForm;

loadIdentity();
identity ? renderPunch() : show('register');
</script>
</body>
</html>
