<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex">
<title>Temp Time Clock — AM-HUB West</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --mt-blue:#244ba6; --mt-blue-dark:#1c3c85; --mt-green:#4c9d2f; --mt-green-dark:#3f8226; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f2f5; color:#1a1a1a; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  header { background:var(--mt-blue); color:#fff; padding:18px 20px 16px; text-align:center; }
  header h1 { font-size:21px; font-weight:700; letter-spacing:.06em; }
  header .sub { font-size:11px; letter-spacing:.14em; opacity:.85; margin-top:3px; text-transform:uppercase; }

  main { flex:1; width:100%; max-width:460px; margin:0 auto; padding:20px 16px 32px; }
  .card { background:#fff; border:1px solid #e2e5ea; border-radius:14px; padding:22px 18px; box-shadow:0 1px 3px rgba(20,40,90,.06); }

  .hidden { display:none !important; }

  /* ---- Register ---- */
  #register h2 { font-size:19px; margin-bottom:4px; }
  #register p { font-size:13.5px; color:#666; margin-bottom:18px; line-height:1.45; }
  label { display:block; font-size:12.5px; font-weight:600; color:#444; margin:14px 0 5px; }
  input[type=text] { width:100%; padding:13px 12px; font-size:17px; border:1.5px solid #cfd4dc; border-radius:9px; outline:none; background:#fff; }
  input[type=text]:focus { border-color:var(--mt-blue); }
  .btn { display:block; width:100%; border:none; border-radius:11px; font-size:17px; font-weight:700; padding:15px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .btn-green { background:var(--mt-green); color:#fff; margin-top:20px; }
  .btn-green:active { background:var(--mt-green-dark); }

  /* ---- Punch screen ---- */
  #greet { margin-bottom:16px; }
  #greet .hi { font-size:21px; font-weight:700; }
  #greet .date { font-size:13px; color:#777; margin-top:2px; }
  .punch-btn { display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:#fff; border:1.5px solid #cfd4dc; border-radius:12px; padding:16px 16px; margin-bottom:11px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .punch-btn:active { background:#f4f6f9; }
  .punch-btn .pt { font-size:17px; font-weight:700; color:var(--mt-blue); }
  .punch-btn .ps { font-size:12.5px; color:#8a8f98; margin-top:1px; }
  .punch-btn .ic { flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:#eef1f7; color:var(--mt-blue); display:flex; align-items:center; justify-content:center; }
  .punch-btn.suggested { border-color:var(--mt-green); background:#f4faf0; }
  .punch-btn.suggested .ic { background:var(--mt-green); color:#fff; }
  .punch-btn.suggested .pt { color:var(--mt-green-dark); }
  .punch-btn.suggested::after { content:'NEXT'; margin-left:auto; font-size:10px; font-weight:800; letter-spacing:.1em; color:#fff; background:var(--mt-green); border-radius:5px; padding:3px 7px; }
  .switch { text-align:center; margin-top:14px; }
  .switch a { font-size:13px; color:#8a8f98; text-decoration:underline; cursor:pointer; }

  /* ---- Confirm sheet ---- */
  #overlay { position:fixed; inset:0; background:rgba(15,25,50,.45); display:flex; align-items:flex-end; justify-content:center; z-index:10; }
  #sheet { background:#fff; width:100%; max-width:460px; border-radius:18px 18px 0 0; padding:24px 20px 30px; }
  #sheet h3 { font-size:18px; text-align:center; }
  #sheet .at { text-align:center; font-size:14px; color:#666; margin:6px 0 8px; }
  #sheet .note { text-align:center; font-size:12.5px; color:#8a8f98; margin-bottom:18px; line-height:1.4; }
  .btn-blue { background:var(--mt-blue); color:#fff; }
  .btn-blue:active { background:var(--mt-blue-dark); }
  .btn-ghost { background:#fff; color:#666; border:1.5px solid #cfd4dc; margin-top:10px; }

  #err { display:none; background:#fdecea; color:#b3261e; border:1px solid #f5c6c2; border-radius:9px; font-size:13.5px; padding:11px 13px; margin-bottom:14px; line-height:1.4; }

  footer { text-align:center; font-size:10.5px; color:#a9adb5; letter-spacing:.12em; padding:0 0 22px; text-transform:uppercase; }
</style>
</head>
<body>

<header>
  <h1>TEMP TIME CLOCK</h1>
  <div class="sub">AM-HUB West &middot; Mettler Toledo</div>
</header>

<main>
  <div id="err"></div>

  <!-- First visit: who are you -->
  <section class="card hidden" id="register">
    <h2>Welcome!</h2>
    <p>Enter your name once — this phone will remember you for every punch after this.</p>
    <label for="fn">First name</label>
    <input type="text" id="fn" autocomplete="given-name" autocapitalize="words">
    <label for="ln">Last name</label>
    <input type="text" id="ln" autocomplete="family-name" autocapitalize="words">
    <button class="btn btn-green" id="saveBtn">Continue</button>
  </section>

  <!-- Punch -->
  <section class="card hidden" id="punch">
    <div id="greet"><div class="hi"></div><div class="date"></div></div>
    <div id="punchBtns"></div>
    <div class="switch"><a id="switchUser">Not you? Switch person</a></div>
  </section>
</main>

<!-- Confirm -->
<div id="overlay" class="hidden">
  <div id="sheet">
    <h3 id="sheetType"></h3>
    <div class="at" id="sheetAt"></div>
    <div class="note">Your name &amp; punch are filled in on the next page &mdash; just tap <b>Submit</b> there.</div>
    <button class="btn btn-blue" id="confirmBtn">Continue</button>
    <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
  </div>
</div>

<footer>Powered by AM-HUB West</footer>

<script>
/* ================= CONFIG =================
   1. Create the "Temp Time Clock" Microsoft Form (see build guide):
        Q1 text  = Your name (First Last)
        Q2 choice = Punch  →  Start Shift / Lunch Out / Lunch In / End Shift
   2. On the form: ⋯ menu → "Get pre-filled URL"
        answer Q1 with exactly:  NAMEHERE
        answer Q2 with:          Start Shift
      Copy that link and paste it between the quotes below.       */
const PREFILL_SAMPLE = "https://forms.office.com/Pages/ResponsePage.aspx?id=7gpM-9JsL0ihpXF-fAJJa4uyb3W6knFFgWJ3yKuR1UtUNlI2SE9RSU9HUlE3UzZOUFhZWDNBVkFTUSQlQCN0PWcu&rc6452bc35d1d426da38f8ac74b5f9d22=NAMEHERE&r6149240f6e8448e9975efb098a4bfd3b=%22Start%20Shift%22";
/* ========================================== */

const PUNCHES = [
  { type:"Start Shift", sub:"Beginning of your day",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>' },
  { type:"Lunch Out", sub:"Leaving for lunch",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/></svg>' },
  { type:"Lunch In", sub:"Back from lunch",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' },
  { type:"End Shift", sub:"Done for the day",
    ic:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>' }
];

const $ = id => document.getElementById(id);
const err = $('err');
let identity = null;     // { name, id }
let pendingType = null;

/* ---------- identity ---------- */
function loadIdentity(){
  const p = new URLSearchParams(location.search);
  const n = (p.get('n')||'').trim(), e = (p.get('e')||'').trim();
  if (n){
    identity = { name:n, id:e };
    try { localStorage.setItem('tpIdentity', JSON.stringify(identity)); } catch(_){}
    history.replaceState(null,'',location.pathname);
    return;
  }
  try {
    const s = localStorage.getItem('tpIdentity');
    if (s){ const o = JSON.parse(s); if (o && o.name) identity = o; }
  } catch(_){}
}

/* ---------- suggestion ---------- */
function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}
function suggestedType(){
  try {
    const s = JSON.parse(localStorage.getItem('tpLast')||'null');
    if (!s || s.day !== todayKey()) return 'Start Shift';
    const i = PUNCHES.findIndex(p => p.type === s.type);
    return (i >= 0 && i < PUNCHES.length-1) ? PUNCHES[i+1].type : 'Start Shift';
  } catch(_) { return 'Start Shift'; }
}

/* ---------- screens ---------- */
function show(id){
  ['register','punch'].forEach(s => $(s).classList.toggle('hidden', s !== id));
}
function renderPunch(){
  $('greet').querySelector('.hi').textContent = 'Hi, ' + identity.name.split(' ')[0] + ' \uD83D\uDC4B';
  $('greet').querySelector('.date').textContent =
    new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
  const sug = suggestedType();
  const wrap = $('punchBtns'); wrap.innerHTML = '';
  PUNCHES.forEach(p => {
    const b = document.createElement('button');
    b.className = 'punch-btn' + (p.type === sug ? ' suggested' : '');
    b.innerHTML = '<span class="ic">' + p.ic + '</span><span><span class="pt">' + p.type + '</span><br><span class="ps">' + p.sub + '</span></span>';
    b.onclick = () => openConfirm(p.type);
    wrap.appendChild(b);
  });
  show('punch');
}

/* ---------- prefilled Form URL ---------- */
function formUrl(name, punch){
  let u = PREFILL_SAMPLE;
  u = u.replace(/NAMEHERE/g, encodeURIComponent(name));
  // swap the sample's "Start Shift" answer for the chosen punch, matching its encoding
  u = u.replace(/Start(?:%20|\+| )Shift/g, m =>
        m.indexOf('+') > -1 ? encodeURIComponent(punch).replace(/%20/g,'+') : encodeURIComponent(punch));
  return u;
}
function configured(){
  return /^https?:\/\//.test(PREFILL_SAMPLE) && PREFILL_SAMPLE.indexOf('NAMEHERE') > -1;
}

/* ---------- confirm & submit ---------- */
function nowStr(){ return new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }); }
function openConfirm(type){
  pendingType = type;
  $('sheetType').textContent = type + '?';
  $('sheetAt').textContent = identity.name + ' \u00B7 ' + nowStr();
  $('overlay').classList.remove('hidden');
}
function closeConfirm(){ $('overlay').classList.add('hidden'); pendingType = null; }

function submitPunch(){
  const type = pendingType;
  err.style.display = 'none';
  if (!configured()){
    closeConfirm();
    err.textContent = 'This page is not connected to the form yet — paste the pre-filled form URL into PREFILL_SAMPLE (see build guide).';
    err.style.display = 'block';
    window.scrollTo(0,0);
    return;
  }
  if (!navigator.onLine){
    closeConfirm();
    err.textContent = 'Your phone looks offline — reconnect and try again, or tell your supervisor the time so it can be entered manually.';
    err.style.display = 'block';
    window.scrollTo(0,0);
    return;
  }
  try { localStorage.setItem('tpLast', JSON.stringify({ type, day: todayKey() })); } catch(_){}
  location.href = formUrl(identity.name, type);
}

/* ---------- wiring ---------- */
$('saveBtn').onclick = () => {
  const cap = s => s.replace(/(^|\s)\S/g, c => c.toUpperCase());
  const fn = cap($('fn').value.trim()), ln = cap($('ln').value.trim());
  if (!fn || !ln){
    err.textContent = 'Please enter both your first and last name.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  identity = { name: fn + ' ' + ln, id: 'P-' + Math.random().toString(36).slice(2,6).toUpperCase() };
  try { localStorage.setItem('tpIdentity', JSON.stringify(identity)); } catch(_){}
  renderPunch();
};
$('switchUser').onclick = () => {
  try { localStorage.removeItem('tpIdentity'); localStorage.removeItem('tpLast'); } catch(_){}
  identity = null; $('fn').value = ''; $('ln').value = '';
  show('register');
};
$('confirmBtn').onclick = submitPunch;
$('cancelBtn').onclick  = closeConfirm;
$('overlay').onclick = e => { if (e.target === $('overlay')) closeConfirm(); };

loadIdentity();
identity ? renderPunch() : show('register');
</script>
</body>
</html>
